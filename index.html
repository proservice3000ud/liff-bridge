<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>กำลังเชื่อมต่อ...</title>
  <script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: sans-serif;
      background: #06C755;
      color: white;
      font-size: 20px;
    }
  </style>
</head>
<body>
  <div>กำลังเชื่อมต่อ...</div>

  <script>
    const LIFF_ID = "2009807969-fTLOZ9ph";
    const WEBHOOK_URL = "https://hook.us2.make.com/9augghk4hh6pns0m5cdz5uemewsjr5nu";

    async function main() {

      const currentParams = new URLSearchParams(window.location.search);
      const keyword    = currentParams.get("keyword")      || "";
      const matchtype  = currentParams.get("matchtype")    || "";
      const campaign   = currentParams.get("utm_campaign") || "";
      const content    = currentParams.get("utm_content")  || "";
      const utmSource  = currentParams.get("utm_source")   || "";

      // สร้าง redirectUri ที่มี params ติดไปด้วย
      const redirectUri = window.location.origin + window.location.pathname
        + "?keyword=" + encodeURIComponent(keyword)
        + "&matchtype=" + encodeURIComponent(matchtype)
        + "&utm_source=" + encodeURIComponent(utmSource)
        + "&utm_campaign=" + encodeURIComponent(campaign)
        + "&utm_content=" + encodeURIComponent(content);

      await liff.init({ liffId: LIFF_ID });

      if (!liff.isLoggedIn()) {
        liff.login({ redirectUri: redirectUri });
        return;
      }

      // หลัง login แล้ว ดึง params จาก URL ปัจจุบัน
      const params = new URLSearchParams(window.location.search);
      const kw         = params.get("keyword")      || "";
      const mt         = params.get("matchtype")    || "";
      const camp       = params.get("utm_campaign") || "";
      const cont       = params.get("utm_content")  || "";
      const src        = params.get("utm_source")   || "";

      const profile    = await liff.getProfile();
      const device     = /Mobi|Android/i.test(navigator.userAgent) ? "มือถือ" : "คอมพิวเตอร์";
      const timestamp  = new Date().toLocaleString("th-TH", { timeZone: "Asia/Bangkok" });

      // แยกช่องทางอัตโนมัติ
      let channel = "Direct";
      if (kw) {
        channel = "Google Ads";
      } else if (document.referrer.includes("google")) {
        channel = "Google SEO";
      } else if (document.referrer.includes("facebook") || document.referrer.includes("fb.com")) {
        channel = "Facebook";
      } else if (src) {
        channel = src;
      }

      const data = {
        lineUserId:   profile.userId,
        displayName:  profile.displayName,
        keyword:      kw || "(not provided)",
        matchtype:    mt,
        utm_source:   channel,
        utm_campaign: camp,
        utm_content:  cont,
        device:       device,
        timestamp:    timestamp
      };

      try {
        await fetch(WEBHOOK_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });
      } catch (e) {
        console.error("Webhook error:", e);
      }

      liff.openWindow({
        url: "https://line.me/R/ti/p/@aisclub",
        external: false
      });
    }

    main().catch(console.error);
  </script>
</body>
</html>
