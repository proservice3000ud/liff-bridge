<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>กำลังเชื่อมต่อ...</title>
  <link rel="preload" href="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js" as="script">
  <script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Helvetica Neue', sans-serif;
      background: linear-gradient(160deg, #06C755 0%, #048a3a 100%);
      color: white;
      padding: 20px;
    }
    .logo-img {
      width: 80%;
      max-width: 300px;
      margin-bottom: 24px;
      border-radius: 16px;
    }
    .line-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.15);
      border-radius: 50px;
      padding: 10px 20px;
      margin-bottom: 20px;
    }
    .line-icon {
      width: 32px;
      height: 32px;
      background: white;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .line-icon svg {
      width: 24px;
      height: 24px;
    }
    .line-text {
      font-size: 16px;
      font-weight: 600;
    }
    .status-text {
      font-size: 14px;
      opacity: 0.85;
      margin-bottom: 24px;
    }
    .dots {
      display: flex;
      gap: 8px;
    }
    .dot {
      width: 10px;
      height: 10px;
      background: white;
      border-radius: 50%;
      opacity: 0.4;
      animation: pulse 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.3); }
    }
  </style>
</head>
<body>
  <img class="logo-img" src="https://ais-fibre3.com/wp-content/uploads/2024/01/ais-fibre-agent-element-1.webp" alt="AIS Fibre3">
  <div class="line-badge">
    <div class="line-icon">
      <svg viewBox="0 0 24 24" fill="#06C755">
        <path d="M12 2C6.48 2 2 6.03 2 11c0 3.13 1.68 5.9 4.28 7.6L5.5 22l3.62-1.9C10.3 20.67 11.15 21 12 21c5.52 0 10-4.03 10-9S17.52 2 12 2z"/>
      </svg>
    </div>
    <span class="line-text">กำลังพาคุณไปยัง LINE @aisclub</span>
  </div>
  <p class="status-text">กรุณารอสักครู่...</p>
  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <script>
    const LIFF_ID = "2009807969-fTLOZ9ph";
    const WEBHOOK_URL = "https://hook.us2.make.com/9augghk4hh6pns0m5cdz5uemewsjr5nu";
    async function main() {
      const currentParams = new URLSearchParams(window.location.search);
      const keyword   = currentParams.get("keyword")      || "";
      const matchtype = currentParams.get("matchtype")    || "";
      const campaign  = currentParams.get("utm_campaign") || "";
      const channel   = currentParams.get("channel")      || "Direct";
      await liff.init({ 
        liffId: LIFF_ID,
        withLoginOnExternalBrowser: true
      });
      if (!liff.isLoggedIn()) {
        const state = encodeURIComponent(
          "kw=" + encodeURIComponent(keyword) +
          "&mt=" + encodeURIComponent(matchtype) +
          "&cp=" + encodeURIComponent(campaign) +
          "&ch=" + encodeURIComponent(channel)
        );
        liff.login({ redirectUri: window.location.origin + window.location.pathname + "?liff.state=" + state });
        return;
      }
      let kw = keyword;
      let mt = matchtype;
      let cp = campaign;
      let ch = channel;
      const liffState = currentParams.get("liff.state");
      if (liffState) {
        try {
          const stateParams = new URLSearchParams(decodeURIComponent(liffState));
          kw = stateParams.get("kw") || kw;
          mt = stateParams.get("mt") || mt;
          cp = stateParams.get("cp") || cp;
          ch = stateParams.get("ch") || ch;
        } catch(e) {}
      }
      if (!kw) kw = currentParams.get("kw") || "";
      if (!mt) mt = currentParams.get("mt") || "";
      if (!cp) cp = currentParams.get("cp") || "";
      if (!ch) ch = currentParams.get("ch") || "Direct";
      const profile   = await liff.getProfile();
      const device    = /Mobi|Android/i.test(navigator.userAgent) ? "มือถือ" : "คอมพิวเตอร์";
      const timestamp = new Date().toLocaleString("th-TH", { timeZone: "Asia/Bangkok" });
      const data = {
        lineUserId:   profile.userId,
        displayName:  profile.displayName,
        keyword:      kw || "(not provided)",
        matchtype:    mt,
        utm_source:   ch,
        utm_campaign: cp,
        device:       device,
        timestamp:    timestamp
      };
      const blob = new Blob([JSON.stringify(data)], { type: "application/json" });
      navigator.sendBeacon(WEBHOOK_URL, blob);
      try {
        await fetch(WEBHOOK_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          keepalive: true,
          body: JSON.stringify(data)
        });
      } catch (e) {
        console.error("Webhook error:", e);
      }
      liff.openWindow({
        url: "https://line.me/R/ti/p/@aisclub",
        external: false
      });
    }
    main().catch(console.error);
  </script>
</body>
</html>
