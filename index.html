<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>กำลังเชื่อมต่อ...</title>
  <script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: sans-serif;
      background: #06C755;
      color: white;
      font-size: 20px;
    }
  </style>
</head>
<body>
  <div>กำลังเชื่อมต่อ...</div>

  <script>
    const LIFF_ID = "2009807969-fTLOZ9ph";
    const WEBHOOK_URL = "https://hook.us2.make.com/9augghk4hh6pns0m5cdz5uemewsjr5nu";

    async function main() {

      const currentParams = new URLSearchParams(window.location.search);
      const keyword   = currentParams.get("keyword")   || "";
      const matchtype = currentParams.get("matchtype") || "";
      const campaign  = currentParams.get("utm_campaign") || "";

      // สร้าง redirectUri แบบสั้น เฉพาะ keyword และ matchtype
      const baseUrl = window.location.origin + window.location.pathname;
      const redirectUri = baseUrl
        + "?kw=" + encodeURIComponent(keyword)
        + "&mt=" + encodeURIComponent(matchtype)
        + "&cp=" + encodeURIComponent(campaign);

      await liff.init({ liffId: LIFF_ID });

      if (!liff.isLoggedIn()) {
        liff.login({ redirectUri: redirectUri });
        return;
      }

      // หลัง login ดึง params จาก URL
      const params = new URLSearchParams(window.location.search);
      const kw   = params.get("kw") || params.get("keyword") || "";
      const mt   = params.get("mt") || params.get("matchtype") || "";
      const cp   = params.get("cp") || params.get("utm_campaign") || "";

      const profile   = await liff.getProfile();
      const device    = /Mobi|Android/i.test(navigator.userAgent) ? "มือถือ" : "คอมพิวเตอร์";
      const timestamp = new Date().toLocaleString("th-TH", { timeZone: "Asia/Bangkok" });

      // แยกช่องทางอัตโนมัติ
      let channel = "Direct";
      if (kw) {
        channel = "Google Ads";
      } else if (document.referrer.includes("google")) {
        channel = "Google SEO";
      } else if (document.referrer.includes("facebook") || document.referrer.includes("fb.com")) {
        channel = "Facebook";
      }

      const data = {
        lineUserId:   profile.userId,
        displayName:  profile.displayName,
        keyword:      kw || "(not provided)",
        matchtype:    mt,
        utm_source:   channel,
        utm_campaign: cp,
        device:       device,
        timestamp:    timestamp
      };

      try {
        await fetch(WEBHOOK_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });
      } catch (e) {
        console.error("Webhook error:", e);
      }

      liff.openWindow({
        url: "https://line.me/R/ti/p/@aisclub",
        external: false
      });
    }

    main().catch(console.error);
  </script>
</body>
</html>
